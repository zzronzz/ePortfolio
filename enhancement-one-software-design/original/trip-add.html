<!-- Container for Add/Edit Trip form -->
<div class="container mt-4">
  <div class="row justify-content-center">
    
    <!-- Form card -->
    <div class="col-md-6">
      <!-- Title for the form -->
      <h3>Add Trip</h3>

      <!-- Form submission triggers onSubmit() in component -->
      <form (ngSubmit)="onSubmit()">

        <!-- Trip code input -->
        <input 
          class="form-control mb-2" 
          [(ngModel)]="trip.code" 
          name="code" 
          placeholder="Code">

        <!-- Trip name input -->
        <input 
          class="form-control mb-2" 
          [(ngModel)]="trip.name" 
          name="name" 
          placeholder="Name">

        <!-- Trip length input -->
        <input 
          class="form-control mb-2" 
          [(ngModel)]="trip.length" 
          name="length" 
          placeholder="Length">

        <!-- Resort name input -->
        <input 
          class="form-control mb-2" 
          [(ngModel)]="trip.resort" 
          name="resort" 
          placeholder="Resort">

        <!-- Price per person input -->
        <input 
          class="form-control mb-2" 
          [(ngModel)]="trip.perPerson" 
          name="perPerson" 
          placeholder="Price">

        <!-- Image filename input (expects file name like reef1.jpg) -->
        <input 
          class="form-control mb-2" 
          [(ngModel)]="trip.image" 
          name="image" 
          placeholder="reef1.jpg">

        <!-- Description textarea -->
        <textarea 
          class="form-control mb-2" 
          [(ngModel)]="trip.description" 
          name="description" 
          placeholder="Description"></textarea>

        <!-- Button dynamically switches between Add and Update -->
        <button class="btn btn-primary">
          {{ trip._id ? 'Update Trip' : 'Add Trip' }}
        </button>

      </form>
    </div>

  </div>
</div>
