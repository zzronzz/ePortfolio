<div class="container mt-5">
  <h3>Login</h3>

  <!-- Login form triggers onSubmit() when submitted -->
  <form (ngSubmit)="onSubmit()">

    <!-- Email input field bound to credentials.email -->
    <div class="mb-3">
      <label>Email</label>
      <input [(ngModel)]="credentials.email" name="email" class="form-control" required>
    </div>

    <!-- Password input field bound to password variable -->
    <div class="mb-3">
      <label>Password</label>
      <input [(ngModel)]="password" name="password" type="password" class="form-control" required>
    </div>

    <!-- Submit button for login -->
    <button class="btn btn-primary">Login</button>
  </form>
</div>
